{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h2>Delete Task</h2>
        <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'tasks:task-detail' object.pk %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
